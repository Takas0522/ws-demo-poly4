version: '3.8'

services:
  service-setting:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - COSMOS_ENDPOINT=${COSMOS_ENDPOINT}
      - COSMOS_KEY=${COSMOS_KEY}
      - COSMOS_DATABASE=settingsdb
      - COSMOS_CONTAINER=configurations
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=auth-service
      - LOG_LEVEL=info
    depends_on:
      - redis
    networks:
      - service-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - service-network

volumes:
  redis-data:

networks:
  service-network:
    driver: bridge
